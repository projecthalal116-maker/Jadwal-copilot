<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tryout CPNS Online</title><style>
body{font-family:'Segoe UI',sans-serif;margin:0;background:#f9fbff;color:#222}
header{display:flex;justify-content:space-between;align-items:center;background:#2d7be0;color:#fff;padding:10px 20px}
header h1{margin:0;font-size:18px;font-weight:600}
.info-box{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:14px}
.timer{font-size:16px;font-weight:600}
.container{display:flex;flex-direction:row;height:calc(100vh - 60px)}
.sidebar{width:180px;overflow-y:auto;background:#e9f2ff;padding:10px;display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.sidebar button{padding:8px;border:none;border-radius:6px;cursor:pointer;background:#fff;font-size:13px;transition:.2s}
.sidebar button.active{background:#2d7be0;color:#fff;font-weight:bold}
.sidebar button.answered{background:#b2d3ff}
.content{flex:1;padding:20px;overflow-y:auto}
.question-box{background:#fff;border-radius:8px;padding:20px;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
.options button{display:block;width:100%;margin:6px 0;padding:10px;border:1px solid #ccc;border-radius:6px;background:#fff;text-align:left;cursor:pointer}
.options button:hover{background:#f1f8ff}
.options button.correct{background:#c5e6b3;border-color:#6cc070}
.options button.wrong{background:#ffbdbd;border-color:#f06262}
.nav{margin-top:15px;display:flex;justify-content:space-between}
.nav button{padding:10px 15px;border:none;border-radius:6px;background:#2d7be0;color:#fff;cursor:pointer;font-weight:600}
.nav button:hover{background:#1d5fb5}
.result{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
canvas{max-width:300px;margin:auto;display:block}
</style></head><body>
<header>
<h1>Tryout CPNS Online</h1>
<div class="info-box">
<div>Total Soal: <span id="total"></span></div>
<div>Dijawab: <span id="answered"></span> | Belum: <span id="unanswered"></span></div>
</div>
<div class="timer">Waktu: <span id="timer">05:00</span></div>
</header>
<div class="container">
<div class="sidebar" id="numberContainer"></div>
<div class="content">
<div id="quiz"></div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const soal=[{kategori:"TWK",soal:"Ideologi Pancasila memiliki fungsi sebagai?",opsi:["Dasar negara","Hiasan lambang negara","Peraturan pemerintah","Semboyan nasional"],jawaban:0,pembahasan:"Pancasila berfungsi sebagai dasar negara Indonesia."},
{kategori:"TIU",soal:"Jika 3x+5=14, maka nilai x adalah?",opsi:["3","4","5","2"],jawaban:0,pembahasan:"3x+5=14 => 3x=9 => x=3"},
{kategori:"TKP",soal:"Anda melihat rekan kerja melakukan kesalahan kecil, sikap Anda?",opsi:["Menegur dengan baik","Membiarkan saja","Melapor langsung ke atasan","Menertawakannya"],jawaban:0,pembahasan:"Menegur dengan baik menunjukkan sikap profesional dan empati."},
{kategori:"TIU",soal:"Manakah bentuk yang berbeda?",svg:`<svg width='120'height='30'><circle cx='15'cy='15'r='10'fill='#2d7be0'/><rect x='40'y='5'width='20'height='20'fill='#2d7be0'/><polygon points='80,25 100,5 120,25'fill='#2d7be0'/><circle cx='150'cy='15'r='10'fill='orange'/></svg>`,opsi:["Bentuk ke-1","Bentuk ke-2","Bentuk ke-3","Bentuk ke-4"],jawaban:3,pembahasan:"Bentuk ke-4 berbeda warna (orange)."},
{kategori:"TIU",soal:"Urutan rotasi yang benar?",svg:`<svg width='120'height='30'><rect x='5'y='5'width='20'height='20'fill='#2d7be0'/><rect x='40'y='5'width='20'height='20'transform='rotate(45 50 15)'fill='#2d7be0'/><rect x='75'y='5'width='20'height='20'transform='rotate(90 85 15)'fill='#2d7be0'/></svg>`,opsi:["0°,45°,90°","90°,0°,45°","45°,90°,0°","0°,90°,45°"],jawaban:0,pembahasan:"Urutan rotasi meningkat 0°,45°,90°."},
{kategori:"TWK",soal:"UUD 1945 disahkan pada tanggal?",opsi:["17 Agustus 1945","18 Agustus 1945","20 Mei 1945","1 Juni 1945"],jawaban:1,pembahasan:"UUD 1945 disahkan pada 18 Agustus 1945 oleh PPKI."},
{kategori:"TKP",soal:"Ketika rekan tidak bekerja dengan baik, Anda?",opsi:["Memberi dukungan","Mengecam","Mengabaikan","Menyerah"],jawaban:0,pembahasan:"Memberi dukungan membangun semangat tim."},
{kategori:"TWK",soal:"Lambang negara Indonesia adalah?",opsi:["Garuda Pancasila","Singa Merah","Burung Elang","Harimau Putih"],jawaban:0,pembahasan:"Lambang negara Indonesia adalah Garuda Pancasila."},
{kategori:"TIU",soal:"5,10,20,40,... selanjutnya?",opsi:["60","70","80","100"],jawaban:2,pembahasan:"Setiap bilangan dikali 2, jadi 40x2=80."},
{kategori:"TKP",soal:"Jika Anda gagal dalam ujian, apa yang dilakukan?",opsi:["Evaluasi diri dan belajar lagi","Menyalahkan teman","Putus asa","Marah pada pengawas"],jawaban:0,pembahasan:"Evaluasi diri menunjukkan ketangguhan mental."}];
let acakSoal=()=>soal.sort(()=>Math.random()-.5);let data=acakSoal(),idx=0,score={TWK:0,TIU:0,TKP:0},answeredArr=Array(data.length).fill(false),timerSec=300,interval;
function mulaiTimer(){interval=setInterval(()=>{timerSec--;let m=Math.floor(timerSec/60),s=timerSec%60;document.getElementById("timer").textContent=`${m}:${s<10?"0":""}${s}`;if(timerSec<=0){clearInterval(interval);selesai()}},1000);}
function tampilSoal(i){if(i>=data.length){selesai();return;}
let q=data[i];let html=`<div class='question-box'><h3>Soal ${i+1} (${q.kategori})</h3>${q.svg?q.svg:`<p>${q.soal}</p>`}<div class='options'>${q.opsi.map((o,ix)=>`<button onclick='jawab(${i},${ix},this)'>${o}</button>`).join("")}</div><div id='pembahasan' style='display:none;margin-top:10px;padding:10px;background:#f1f8ff;border-left:4px solid #2d7be0;'>${q.pembahasan}</div><div class='nav'><button onclick='lewat(${i})'>Lewatkan Soal Ini</button><button onclick='lanjut(${i})'>Simpan & Lanjutkan</button></div></div>`;document.getElementById("quiz").innerHTML=html;updateSidebar();}
function jawab(i,j,el){if(answeredArr[i])return;answeredArr[i]=true;let btns=document.querySelectorAll(".options button");btns.forEach((b,ix)=>{if(ix===data[i].jawaban)b.classList.add("correct");else if(ix===j)b.classList.add("wrong");b.disabled=true;});if(j===data[i].jawaban)score[data[i].kategori]++;document.getElementById("pembahasan").style.display="block";updateSidebar();}
function lewat(i){idx++;if(idx>=data.length)selesai();else tampilSoal(idx);}
function lanjut(i){idx++;if(idx>=data.length)selesai();else tampilSoal(idx);}
function updateSidebar(){let cont=document.getElementById("numberContainer");cont.innerHTML="";answeredArr.forEach((a,i)=>{let b=document.createElement("button");b.textContent=i+1;b.className=i===idx?"active":a?"answered":"";b.onclick=()=>{idx=i;tampilSoal(i)};cont.appendChild(b);});document.getElementById("total").textContent=data.length;let ans=answeredArr.filter(x=>x).length;document.getElementById("answered").textContent=ans;document.getElementById("unanswered").textContent=data.length-ans;}
function selesai(){clearInterval(interval);let totalBenar=score.TWK+score.TIU+score.TKP;let twkP=(score.TWK/3)*100,tiuP=(score.TIU/3)*100,tkpP=(score.TKP/4)*100;document.querySelector(".content").innerHTML=`<div class='result'><h2>Hasil Tryout</h2><p>TWK: ${score.TWK} benar (${twkP.toFixed(0)}%)<br>TIU: ${score.TIU} benar (${tiuP.toFixed(0)}%)<br>TKP: ${score.TKP} benar (${tkpP.toFixed(0)}%)<br><b>Total: ${totalBenar} dari ${data.length}</b></p><canvas id='chart'></canvas><button onclick='ulang()' style='margin-top:10px;background:#2d7be0;color:#fff;padding:10px 15px;border:none;border-radius:6px;cursor:pointer;'>Ulangi Tryout</button></div>`;new Chart(document.getElementById("chart"),{type:"pie",data:{labels:["TWK","TIU","TKP"],datasets:[{data:[score.TWK,score.TIU,score.TKP],backgroundColor:["#2d7be0","#5ea3f3","#9dc8ff"]}]}});}
function ulang(){data=acakSoal();idx=0;score={TWK:0,TIU:0,TKP:0};answeredArr=Array(data.length).fill(false);timerSec=300;clearInterval(interval);mulaiTimer();tampilSoal(0);}
window.onload=()=>{mulaiTimer();tampilSoal(0);}
</script></body></html>
