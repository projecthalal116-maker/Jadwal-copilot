<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajer Akun Copilot</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar untuk tampilan yang lebih rapi */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Memperbaiki tampilan icon kalender bawaan browser */
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <div class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <!-- Header -->
        <header class="mb-8 text-center sm:text-left flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 flex items-center justify-center sm:justify-start gap-2">
                    <i data-lucide="github" class="w-8 h-8"></i>
                    Manajer Akun Copilot
                </h1>
                <p class="text-slate-500 mt-1 text-sm">Lacak status penggunaan email untuk sesi GitHub Copilot Anda.</p>
            </div>
            <button onclick="exportData()" class="text-sm bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 py-2 px-4 rounded-lg shadow-sm flex items-center gap-2 transition-colors">
                <i data-lucide="download" class="w-4 h-4"></i> Export Data
            </button>
        </header>

        <!-- Stats Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <p class="text-sm text-slate-500 font-medium">Total Akun</p>
                <p class="text-2xl font-bold text-slate-800" id="stat-total">0</p>
            </div>
            <div class="bg-green-50 p-4 rounded-xl shadow-sm border border-green-100">
                <p class="text-sm text-green-600 font-medium">Tersedia</p>
                <p class="text-2xl font-bold text-green-700" id="stat-tersedia">0</p>
            </div>
            <div class="bg-blue-50 p-4 rounded-xl shadow-sm border border-blue-100">
                <p class="text-sm text-blue-600 font-medium">Sedang Aktif</p>
                <p class="text-2xl font-bold text-blue-700" id="stat-aktif">0</p>
            </div>
            <div class="bg-red-50 p-4 rounded-xl shadow-sm border border-red-100">
                <p class="text-sm text-red-600 font-medium">Sesi Habis</p>
                <p class="text-2xl font-bold text-red-700" id="stat-habis">0</p>
            </div>
        </div>

        <!-- Add Account Form -->
        <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 mb-8">
            <form id="add-form" class="flex flex-col sm:flex-row gap-3">
                <div class="flex-1 relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="mail" class="w-5 h-5 text-slate-400"></i>
                    </div>
                    <input type="text" id="email-input" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-300 text-slate-900 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="Masukkan email (bisa lebih dari satu, pisahkan dengan koma)">
                </div>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-6 rounded-lg shadow-sm flex items-center justify-center gap-2 transition-colors whitespace-nowrap">
                    <i data-lucide="plus" class="w-5 h-5"></i> Tambah Akun
                </button>
            </form>
        </div>

        <!-- Filters & List -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="border-b border-slate-200 p-4 flex flex-col sm:flex-row justify-between items-center gap-4 bg-slate-50/50">
                <h2 class="text-lg font-semibold text-slate-800">Daftar Akun</h2>
                <div class="flex gap-2">
                    <select id="filter-status" class="bg-white border border-slate-300 text-slate-700 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2 outline-none">
                        <option value="semua">Semua Status</option>
                        <option value="tersedia">Tersedia</option>
                        <option value="aktif">Sedang Aktif</option>
                        <option value="habis">Sesi Habis</option>
                    </select>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-slate-600">
                    <thead class="text-xs text-slate-500 uppercase bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th scope="col" class="px-6 py-3">Alamat Email</th>
                            <th scope="col" class="px-6 py-3">Status</th>
                            <th scope="col" class="px-6 py-3">Mulai Aktif</th>
                            <th scope="col" class="px-6 py-3">Tanggal Habis</th>
                            <th scope="col" class="px-6 py-3 text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="account-list" class="divide-y divide-slate-100">
                        <!-- Item List Generated by JS -->
                    </tbody>
                </table>
            </div>
            
            <!-- Empty State -->
            <div id="empty-state" class="hidden p-8 text-center text-slate-500">
                <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-3 text-slate-300"></i>
                <p>Belum ada akun yang ditambahkan atau tidak ada yang sesuai filter.</p>
            </div>
        </div>

    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 flex flex-col gap-2 z-50"></div>

    <!-- Application Logic -->
    <script>
        // Inisialisasi ikon Lucide
        lucide.createIcons();

        // State Aplikasi
        let accounts = JSON.parse(localStorage.getItem('copilotAccountsData'));

        // Load data default jika localStorage kosong
        if (!accounts) {
            const now = new Date().toISOString();
            const defaultEmails = [
                "proyeklms177@gmail.com",
                "animasi.indones14@gmail.com",
                "mameon.id@gmail.com",
                "tumbasniki1@gmail.com",
                "kecamatanjombang001@gmail.com",
                "planetcreative@gmail.com",
                "bintangpurwindoardhip@gmail.com",
                "projecthalal116@gmail.com",
                "gloryproject69@gmail.com",
                "newshalal6@gmail.com",
                "anonymousproject18@gmail.com",
                "reactlms4@gmail.com"
            ];
            
            accounts = defaultEmails.map((email, index) => ({
                id: 'init-' + index,
                email: email,
                status: 'tersedia',
                lastUpdated: now,
                tanggalAktif: null,
                tanggalHabis: null
            }));
            
            localStorage.setItem('copilotAccountsData', JSON.stringify(accounts));
        }

        // Referensi elemen DOM
        const form = document.getElementById('add-form');
        const emailInput = document.getElementById('email-input');
        const accountList = document.getElementById('account-list');
        const emptyState = document.getElementById('empty-state');
        const filterStatus = document.getElementById('filter-status');

        // Fungsi menampilkan Toast (Pesan Notifikasi)
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bgClass = type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
            let icon = type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : 'info';

            toast.className = `${bgClass} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 fade-in max-w-xs`;
            toast.innerHTML = `
                <i data-lucide="${icon}" class="w-5 h-5 flex-shrink-0"></i>
                <span class="text-sm font-medium">${message}</span>
            `;
            
            container.appendChild(toast);
            lucide.createIcons({ root: toast });

            // Hapus toast setelah 3 detik
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                toast.style.transition = 'all 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Fungsi Simpan ke Local Storage
        function saveAccounts() {
            localStorage.setItem('copilotAccountsData', JSON.stringify(accounts));
            render();
        }

        // Fungsi Cek Reset Otomatis (1 Bulan)
        function checkAutoReset() {
            let hasChanges = false;
            const now = new Date();
            
            accounts.forEach(acc => {
                if (acc.status === 'habis' && acc.tanggalHabis) {
                    const resetDate = new Date(acc.tanggalHabis);
                    resetDate.setMonth(resetDate.getMonth() + 1); // Tambah 1 bulan dari tanggal habis
                    
                    // Jika waktu sekarang sudah melewati atau sama dengan tanggal reset
                    if (now >= resetDate) {
                        acc.status = 'tersedia';
                        acc.tanggalAktif = null;
                        acc.tanggalHabis = null;
                        acc.lastUpdated = now.toISOString();
                        hasChanges = true;
                    }
                }
            });
            
            if (hasChanges) {
                localStorage.setItem('copilotAccountsData', JSON.stringify(accounts));
            }
        }

        // Format Tanggal
        function formatDate(dateString) {
            const options = { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Date(dateString).toLocaleDateString('id-ID', options);
        }

        // Menyalin ke Clipboard
        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast('Email berhasil disalin!', 'success');
        }

        // Tambah Akun Baru
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const rawInput = emailInput.value.trim();
            if (!rawInput) return;

            // Bisa input banyak dipisah koma atau spasi
            const emails = rawInput.split(/[, ]+/).map(e => e.trim()).filter(e => e);
            let addedCount = 0;
            let duplicateCount = 0;

            emails.forEach(email => {
                // Validasi format email sederhana
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return; 

                // Cek duplikat
                if (accounts.some(acc => acc.email.toLowerCase() === email.toLowerCase())) {
                    duplicateCount++;
                    return;
                }

                accounts.push({
                    id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString() + Math.random(),
                    email: email,
                    status: 'tersedia', // Default
                    lastUpdated: new Date().toISOString(),
                    tanggalAktif: null,
                    tanggalHabis: null
                });
                addedCount++;
            });

            if (addedCount > 0) {
                showToast(`${addedCount} akun berhasil ditambahkan!`, 'success');
                emailInput.value = '';
                saveAccounts();
            } else if (duplicateCount > 0) {
                showToast('Akun sudah ada di dalam daftar.', 'error');
            } else {
                showToast('Format email tidak valid.', 'error');
            }
        });

        // Ubah Status Akun
        window.changeStatus = function(id, newStatus) {
            const index = accounts.findIndex(acc => acc.id === id);
            if (index !== -1) {
                const now = new Date().toISOString();
                accounts[index].status = newStatus;
                accounts[index].lastUpdated = now;
                
                if (newStatus === 'aktif') {
                    accounts[index].tanggalAktif = now;
                } else if (newStatus === 'habis') {
                    accounts[index].tanggalHabis = now;
                }
                
                saveAccounts();
            }
        };

        // Update Tanggal Aktif Secara Manual
        window.updateTanggalAktif = function(id, dateValue) {
            const index = accounts.findIndex(acc => acc.id === id);
            if (index !== -1) {
                if (dateValue) {
                    const newDate = new Date(dateValue);
                    accounts[index].tanggalAktif = newDate.toISOString();
                } else {
                    accounts[index].tanggalAktif = null;
                }
                accounts[index].lastUpdated = new Date().toISOString();
                saveAccounts();
                showToast('Tanggal aktif diperbarui', 'success');
            }
        };

        // Hapus Akun
        window.deleteAccount = function(id) {
            accounts = accounts.filter(acc => acc.id !== id);
            showToast('Akun berhasil dihapus', 'info');
            saveAccounts();
        };

        // Export data
        window.exportData = function() {
            if(accounts.length === 0) {
                showToast('Tidak ada data untuk diekspor', 'error');
                return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(accounts, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href",     dataStr);
            downloadAnchorNode.setAttribute("download", "copilot_accounts_backup.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        };

        // Render UI
        function render() {
            // Lakukan pengecekan reset otomatis setiap kali UI di-render/dimuat ulang
            checkAutoReset();

            // Update Statistik
            document.getElementById('stat-total').innerText = accounts.length;
            document.getElementById('stat-tersedia').innerText = accounts.filter(a => a.status === 'tersedia').length;
            document.getElementById('stat-aktif').innerText = accounts.filter(a => a.status === 'aktif').length;
            document.getElementById('stat-habis').innerText = accounts.filter(a => a.status === 'habis').length;

            // Filter List
            const currentFilter = filterStatus.value;
            let filteredAccounts = accounts;
            
            if (currentFilter !== 'semua') {
                filteredAccounts = accounts.filter(a => a.status === currentFilter);
            }

            // Urutkan: Aktif -> Tersedia -> Habis, lalu urut waktu
            filteredAccounts.sort((a, b) => {
                const order = { 'aktif': 1, 'tersedia': 2, 'habis': 3 };
                if (order[a.status] !== order[b.status]) {
                    return order[a.status] - order[b.status];
                }
                return new Date(b.lastUpdated) - new Date(a.lastUpdated);
            });

            // Render Table
            accountList.innerHTML = '';
            
            if (filteredAccounts.length === 0) {
                accountList.parentElement.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                accountList.parentElement.classList.remove('hidden');
                emptyState.classList.add('hidden');

                filteredAccounts.forEach(acc => {
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-slate-50 transition-colors group';
                    
                    // Style badge berdasarkan status
                    let badgeClass = '';
                    let badgeText = '';
                    if (acc.status === 'tersedia') {
                        badgeClass = 'bg-green-100 text-green-700 border-green-200';
                        badgeText = 'Tersedia';
                    } else if (acc.status === 'aktif') {
                        badgeClass = 'bg-blue-100 text-blue-700 border-blue-200';
                        badgeText = `
                            <span class="relative flex h-2 w-2 mr-1.5">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                            </span>
                            Sedang Aktif
                        `;
                    } else {
                        badgeClass = 'bg-red-100 text-red-700 border-red-200';
                        badgeText = 'Sesi Habis';
                    }

                    tr.innerHTML = `
                        <td class="px-6 py-4 font-medium text-slate-900 flex items-center gap-3">
                            ${acc.email}
                            <button onclick="copyToClipboard('${acc.email}')" class="text-slate-400 hover:text-blue-600 transition-colors opacity-0 group-hover:opacity-100" title="Salin Email">
                                <i data-lucide="copy" class="w-4 h-4"></i>
                            </button>
                        </td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center px-2.5 py-1 text-xs font-semibold rounded-full border ${badgeClass}">
                                ${badgeText}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <input type="date" 
                                   title="Ubah Tanggal Aktif Secara Manual"
                                   onchange="updateTanggalAktif('${acc.id}', this.value)"
                                   value="${acc.tanggalAktif ? acc.tanggalAktif.substring(0, 10) : ''}"
                                   class="text-xs text-slate-600 bg-transparent border border-transparent hover:border-slate-300 focus:border-blue-500 focus:bg-white rounded px-2 py-1 outline-none transition-all cursor-pointer w-[120px]"
                            >
                        </td>
                        <td class="px-6 py-4 text-xs text-slate-500 whitespace-nowrap">
                            ${acc.tanggalHabis ? formatDate(acc.tanggalHabis) : '-'}
                            ${acc.status === 'habis' && acc.tanggalHabis ? `
                                <br>
                                <span class="mt-1 inline-flex items-center gap-1 text-[10px] text-emerald-600 font-medium bg-emerald-50 px-1.5 py-0.5 rounded border border-emerald-100" title="Akan otomatis tersedia kembali pada tanggal ini">
                                    <i data-lucide="refresh-cw" class="w-3 h-3"></i> 
                                    Reset: ${
                                        (function(){
                                            let d = new Date(acc.tanggalHabis);
                                            d.setMonth(d.getMonth() + 1);
                                            return formatDate(d.toISOString());
                                        })()
                                    }
                                </span>
                            ` : ''}
                        </td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex items-center justify-end gap-2">
                                <select onchange="changeStatus('${acc.id}', this.value)" class="text-xs bg-white border border-slate-300 rounded p-1 outline-none focus:border-blue-500">
                                    <option value="tersedia" ${acc.status === 'tersedia' ? 'selected' : ''}>Tersedia</option>
                                    <option value="aktif" ${acc.status === 'aktif' ? 'selected' : ''}>Pakai (Aktif)</option>
                                    <option value="habis" ${acc.status === 'habis' ? 'selected' : ''}>Tandai Habis</option>
                                </select>
                                <button onclick="deleteAccount('${acc.id}')" class="p-1.5 text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="Hapus">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    accountList.appendChild(tr);
                });
            }
            
            lucide.createIcons({ root: accountList });
        }

        // Event Listener untuk Filter
        filterStatus.addEventListener('change', render);

        // Render pertama kali
        render();

    </script>
</body>
</html>
